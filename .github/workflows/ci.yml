name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Validate bundled suite
        run: fin-eval validate-suite --suite evals/core.yaml

      - name: Smoke run
        run: fin-eval run --suite evals/core.yaml --target mock --limit 5 --out runs/ci-smoke

      - name: Compare smoke run to itself
        run: fin-eval compare --baseline runs/ci-smoke --candidate runs/ci-smoke --gate --out runs/ci-compare
